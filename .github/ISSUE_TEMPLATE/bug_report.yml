name: Bug report
description: Report a bug or unexpected behaviour in NetTroubleshooter
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: NetTroubleshooter version
      description: Example: 0.3.2
      placeholder: "0.3.2"
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
      placeholder: Describe the bug or unexpected behaviour.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What commands did you run?
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: Output or error text
      description: Paste relevant PowerShell output or error text.
      render: powershell
    validations:
      required: false
