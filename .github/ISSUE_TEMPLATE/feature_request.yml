name: Feature request
description: Suggest a new NetTroubleshooter feature or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the feature clearly.

  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: What should be added or improved?
      placeholder: Describe the requested feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
      placeholder: Explain the scenario this feature helps with.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: Optional implementation idea or workflow.
      placeholder: Describe how you imagine this working.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this relate to?
      options:
        - Wi-Fi diagnostics
        - DNS diagnostics
        - LAN diagnostics
        - VPN diagnostics
        - Firewall diagnostics
        - MTU/MSS diagnostics
        - Wi-Fi channel diagnostics
        - Logging/reporting
        - Knowledge base
        - Tests
        - Documentation
        - Other
    validations:
      required: true
